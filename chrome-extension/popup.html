<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a2b5f, #0c4a6e);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff;
    }
    .header-text h1 { font-size: 15px; font-weight: 700; }
    .header-text p { font-size: 11px; color: #94a3b8; }

    /* Status bar */
    .status-bar {
      padding: 10px 20px;
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      font-size: 13px; font-weight: 600;
    }
    .status-bar.active { background: rgba(34, 197, 94, 0.1); color: #4ade80; }
    .status-bar.paused { background: rgba(239, 68, 68, 0.1); color: #f87171; }
    .status-bar.mixed { background: rgba(245, 158, 11, 0.1); color: #fbbf24; }
    .status-bar.unknown { background: rgba(107, 114, 128, 0.1); color: #9ca3af; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .active .status-dot { background: #4ade80; }
    .paused .status-dot { background: #f87171; }
    .mixed .status-dot { background: #fbbf24; }
    .unknown .status-dot { background: #9ca3af; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Big button */
    .big-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: calc(100% - 40px); margin: 16px 20px;
      padding: 16px; border-radius: 12px;
      font-size: 16px; font-weight: 700;
      border: 2px solid; cursor: pointer;
      transition: all 0.15s;
    }
    .big-btn:hover { transform: scale(1.02); }
    .big-btn:active { transform: scale(0.98); }
    .big-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .big-btn.pause-btn {
      background: rgba(239, 68, 68, 0.12); border-color: rgba(239, 68, 68, 0.3);
      color: #f87171;
    }
    .big-btn.pause-btn:hover { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.5); }
    .big-btn.unpause-btn {
      background: rgba(34, 197, 94, 0.12); border-color: rgba(34, 197, 94, 0.3);
      color: #4ade80;
    }
    .big-btn.unpause-btn:hover { background: rgba(34, 197, 94, 0.2); border-color: rgba(34, 197, 94, 0.5); }

    /* Provider list */
    .providers { padding: 0 20px 16px; }
    .provider {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .provider:last-child { border-bottom: none; }
    .provider-emoji { font-size: 18px; width: 28px; text-align: center; }
    .provider-name { flex: 1; font-size: 12px; font-weight: 500; }
    .provider-status {
      font-size: 10px; font-weight: 700; padding: 2px 8px;
      border-radius: 99px; text-transform: uppercase;
    }
    .provider-status.active { background: rgba(34,197,94,0.15); color: #4ade80; }
    .provider-status.paused { background: rgba(239,68,68,0.15); color: #f87171; }

    /* Confirm overlay */
    .confirm-overlay {
      padding: 16px 20px;
      text-align: center;
    }
    .confirm-text { font-size: 14px; margin-bottom: 12px; }
    .confirm-btns { display: flex; gap: 8px; justify-content: center; }
    .confirm-btns button {
      padding: 8px 20px; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; border: none;
    }
    .confirm-yes-pause { background: #ef4444; color: #fff; }
    .confirm-yes-unpause { background: #22c55e; color: #fff; }
    .confirm-cancel { background: rgba(255,255,255,0.1); color: #94a3b8; }

    /* Login form */
    .login-form { padding: 20px; }
    .login-form h2 { font-size: 15px; margin-bottom: 12px; text-align: center; }
    .login-form input {
      width: 100%; padding: 10px 12px; margin-bottom: 8px;
      border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05); color: #fff; font-size: 13px;
      outline: none;
    }
    .login-form input:focus { border-color: #3b82f6; }
    .login-form button {
      width: 100%; padding: 10px; border-radius: 8px;
      background: #3b82f6; color: #fff; font-size: 13px;
      font-weight: 600; border: none; cursor: pointer;
      margin-top: 4px;
    }
    .login-form button:hover { background: #2563eb; }
    .login-error { color: #f87171; font-size: 12px; text-align: center; margin-top: 8px; }

    /* Footer */
    .footer {
      padding: 8px 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-link {
      font-size: 11px; color: #64748b; text-decoration: none;
      cursor: pointer; border: none; background: none;
    }
    .footer-link:hover { color: #94a3b8; }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid currentColor; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">BC</div>
    <div class="header-text">
      <h1>Lead Control</h1>
      <p>Better Choice Insurance</p>
    </div>
  </div>

  <div id="app"></div>

  <script src="popup.js"></script>
</body>
</html>
